<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Planner PRO - Planning V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#eef2f7;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

h1{
color:#1a2b4c;
font-size:28px;
}

.controls{
display:flex;
gap:10px;
}

input,select,button{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#1a2b4c;
color:white;
cursor:pointer;
}

.wrapper{
background:white;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
overflow:auto;
height:80vh;
}

.grid{
display:grid;
grid-template-columns:90px 280px repeat(14,110px);
min-width:max-content;
}

.cell{
border:1px solid #e5e5e5;
padding:8px;
font-size:13px;
min-height:42px;
display:flex;
align-items:center;
}

.head{
background:#1a2b4c;
color:white;
font-weight:bold;
position:sticky;
top:0;
z-index:5;
}

.left{
position:sticky;
left:0;
background:white;
z-index:4;
}

.left2{
position:sticky;
left:90px;
background:white;
z-index:4;
}

.head.left,
.head.left2{
z-index:6;
}

.code{
font-weight:bold;
color:#1a2b4c;
}

.booking-red{
background:#ff4d4d;
font-weight:bold;
border-radius:6px;
justify-content:center;
}

.booking-green{
background:#47b95b;
font-weight:bold;
border-radius:6px;
justify-content:center;
}

.booking-blue{
background:#4aa3ff;
font-weight:bold;
border-radius:6px;
justify-content:center;
}

.booking-orange{
background:#ffb347;
font-weight:bold;
border-radius:6px;
justify-content:center;
}

.conflict{
background:#d60000;
color:white;
font-weight:bold;
border-radius:6px;
justify-content:center;
}
</style>
</head>

<body>

<div class="topbar">
<h1>Planning PRO V2</h1>

<div class="controls">
<input placeholder="Zoek materiaal">
<select>
<option>Alles</option>
<option>Tapwagens</option>
<option>Koelwagens</option>
<option>Toiletwagens</option>
</select>
<button>Nieuwe boeking</button>
</div>
</div>

<div class="wrapper">

<div class="grid">

<!-- header -->
<div class="cell head left">Code</div>
<div class="cell head left2">Omschrijving</div>

<div class="cell head">23-4</div>
<div class="cell head">24-4</div>
<div class="cell head">25-4</div>
<div class="cell head">26-4</div>
<div class="cell head">27-4</div>
<div class="cell head">28-4</div>
<div class="cell head">29-4</div>
<div class="cell head">30-4</div>
<div class="cell head">1-5</div>
<div class="cell head">2-5</div>
<div class="cell head">3-5</div>
<div class="cell head">4-5</div>
<div class="cell head">5-5</div>
<div class="cell head">6-5</div>

<!-- row -->
<div class="cell left code">TW01</div>
<div class="cell left2">Tapwagen 1</div>
<div class="cell booking-red">2515</div>
<div class="cell booking-red">2515</div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

<div class="cell left code">TW02</div>
<div class="cell left2">Tapwagen 2</div>
<div class="cell"></div>
<div class="cell conflict">Dubbel</div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

<div class="cell left code">KW01</div>
<div class="cell left2">Koelwagen 1</div>
<div class="cell"></div>
<div class="cell booking-green">2601</div>
<div class="cell booking-green">2601</div>
<div class="cell booking-green">2601</div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div>

<div class="cell left code">TWC1</div>
<div class="cell left2">Toiletwagen 1</div>
<div class="cell"></div><div class="cell"></div>
<div class="cell booking-blue">2705</div>
<div class="cell booking-blue">2705</div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div>

<div class="cell left code">BW01</div>
<div class="cell left2">Barwagen 1</div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell booking-orange">3001</div>
<div class="cell booking-orange">3001</div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div>
<div class="cell"></div><div class="cell"></div><div class="cell"></div>

</div>
</div>

</body>
</html>
