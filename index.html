<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Planner PRO V6</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#3e6ca8;color:#fff}
.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.panel{
background:#2d4f80;
padding:30px;
border-radius:14px;
width:380px;
box-shadow:0 8px 25px rgba(0,0,0,.25);
}
h1{margin-bottom:15px;color:#ffd65a}
input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
}
button{
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:8px;
background:#ffd65a;
font-weight:bold;
}
.main{display:none}
.top{
background:#a52c2c;
padding:10px 15px;
font-weight:bold;
display:flex;
justify-content:space-between;
}
.wrap{
display:grid;
grid-template-columns:220px 1fr;
height:calc(100vh - 40px);
}
.side{
background:#294975;
padding:15px;
}
.side button{
width:100%;
margin-bottom:8px;
background:#f0f0f0;
}
.content{
padding:15px;
overflow:auto;
}
.page{display:none}
.page.active{display:block}
table{
width:100%;
border-collapse:collapse;
background:#fff;
color:#000;
margin-top:10px;
}
th,td{
border:1px solid #ccc;
padding:8px;
font-size:13px;
}
.card{
background:#fff;
color:#000;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}
.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
<div class="panel">
<h1>Event Planner PRO</h1>
<p style="margin-bottom:10px;">Voer pincode in</p>
<input id="pin" type="password" placeholder="1234">
<button onclick="login()">Open systeem</button>
</div>
</div>

<!-- MAIN -->
<div class="main" id="mainApp">

<div class="top">
<div>Event Planner PRO V6</div>
<div>Admin: 1234</div>
</div>

<div class="wrap">

<div class="side">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('opdracht')">Nieuwe opdracht</button>
<button onclick="show('materiaal')">Materialen</button>
<button onclick="show('admin')">ADMIN</button>
</div>

<div class="content">

<!-- dashboard -->
<div id="dashboard" class="page active">
<div class="card">
<h2>Welkom</h2>
<p>Vandaag 12 opdrachten / 1 conflict</p>
</div>
</div>

<!-- opdracht -->
<div id="opdracht" class="page">
<div class="card">
<h2>Nieuwe opdracht</h2>

<div class="small">
<div>
<label>Titel</label>
<input placeholder="Festival Delft">
</div>
<div>
<label>Datum</label>
<input type="date">
</div>
</div>

<label>Klant</label>
<input placeholder="Naam klant">

<label>Locatie</label>
<input placeholder="Adres locatie">

<button>Opslaan</button>
</div>
</div>

<!-- materiaal -->
<div id="materiaal" class="page">

<div class="card">
<h2>Materiaal toevoegen via code</h2>

<label>Zoek code</label>
<input id="zoekCode" placeholder="TW">

<button onclick="zoekMateriaal()">Zoeken</button>

<table>
<tr><th>Code</th><th>Omschrijving</th><th>Prijs</th></tr>
<tbody id="matRows"></tbody>
</table>

</div>

</div>

<!-- admin -->
<div id="admin" class="page">

<div class="card">
<h2>ADMIN BREIN</h2>

<label>Admin pincode wijzigen</label>
<input placeholder="Nieuwe code">

<label>Gebruikers pincode</label>
<input placeholder="Nieuwe gebruikerscode">

<button>Opslaan codes</button>

<hr style="margin:15px 0">

<h3>Nieuw materiaal aanmaken</h3>

<div class="small">
<div>
<label>Code</label>
<input placeholder="TW92">
</div>

<div>
<label>Categorie</label>
<select>
<option>Tapwagens</option>
<option>Toiletwagens</option>
<option>Koelwagens</option>
</select>
</div>
</div>

<label>Omschrijving</label>
<input placeholder="Tapwagen standaard">

<div class="small">
<div>
<label>Kleur</label>
<input placeholder="Rood">
</div>

<div>
<label>Prijs</label>
<input placeholder="250">
</div>
</div>

<button>Materiaal opslaan</button>

</div>

</div>

</div>
</div>
</div>

<script>
function login(){
if(document.getElementById("pin").value=="1234"){
loginScreen.style.display="none";
mainApp.style.display="block";
}else{
alert("Foute code");
}
}

function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function zoekMateriaal(){
let code=document.getElementById("zoekCode").value.toUpperCase();
let html="";

if(code=="TW"){
html+=`<tr><td>TW92</td><td>Tapwagen standaard 2 kranen</td><td>€250</td></tr>`;
html+=`<tr><td>TW93</td><td>Tapwagen deluxe 4 kranen</td><td>€350</td></tr>`;
}

if(code=="TO"){
html+=`<tr><td>TO11</td><td>Toiletwagen klein</td><td>€300</td></tr>`;
html+=`<tr><td>TO12</td><td>Toiletwagen groot</td><td>€450</td></tr>`;
}

if(code=="KW"){
html+=`<tr><td>KW01</td><td>Koelwagen standaard</td><td>€200</td></tr>`;
}

if(html==""){
html="<tr><td colspan='3'>Geen resultaten</td></tr>";
}

matRows.innerHTML=html;
}
</script>

</body>
</html>
