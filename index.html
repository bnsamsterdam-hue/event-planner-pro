<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Planner PRO - Planning</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
color:#16213e;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#16213e;
color:white;
cursor:pointer;
}

.planner{
display:grid;
grid-template-columns:260px repeat(14,1fr);
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.cell{
border:1px solid #e6e6e6;
padding:8px;
font-size:13px;
min-height:42px;
}

.head{
background:#16213e;
color:white;
font-weight:bold;
text-align:center;
}

.material{
font-weight:bold;
background:#f8f8f8;
}

.booking-red{
background:#ff4d4d;
color:black;
font-weight:bold;
text-align:center;
border-radius:6px;
}

.booking-green{
background:#39b54a;
color:black;
font-weight:bold;
text-align:center;
border-radius:6px;
}

.booking-blue{
background:#3fa9f5;
color:black;
font-weight:bold;
text-align:center;
border-radius:6px;
}

.conflict{
background:#ff0000;
color:white;
font-weight:bold;
text-align:center;
border-radius:6px;
}

.legend{
display:flex;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.legend div{
padding:8px 14px;
border-radius:8px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
