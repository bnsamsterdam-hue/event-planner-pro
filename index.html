<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Planner PRO V4</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:#2f5f9d;
color:#fff;
}

.topbar{
background:#a32b2b;
padding:8px 15px;
font-size:14px;
}

.toolbar{
background:#3d6cab;
padding:10px;
display:flex;
gap:8px;
border-bottom:1px solid #8fb0df;
}

.toolbar button{
padding:8px 16px;
border:none;
background:#f2f2f2;
cursor:pointer;
font-size:13px;
}

.toolbar button:hover{
background:#d4af37;
}

.wrap{
display:grid;
grid-template-columns:320px 1fr;
gap:12px;
padding:12px;
}

.box{
border:1px solid #8fb0df;
padding:10px;
min-height:650px;
}

label{
display:block;
font-size:13px;
margin-top:8px;
margin-bottom:3px;
}

input,select,textarea{
width:100%;
padding:6px;
border:none;
font-size:14px;
}

textarea{height:120px}

.tabs{
display:flex;
gap:2px;
margin-bottom:10px;
}

.tabs button{
padding:8px 12px;
border:none;
background:#cfd8e6;
cursor:pointer;
color:#000;
font-size:13px;
}

.tabs button.active{
background:#fff;
font-weight:bold;
}

.section{
display:none;
background:#4f78b5;
padding:10px;
min-height:580px;
}

.section.active{display:block}

.grid2{
display:grid;
grid-template-columns:120px 1fr;
gap:8px;
align-items:center;
margin-bottom:8px;
}

.small{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
color:#000;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:13px;
}

.rightbtn{
float:right;
margin-bottom:10px;
padding:8px 14px;
border:none;
cursor:pointer;
background:#fff;
}

.save{
margin-top:15px;
padding:10px 18px;
border:none;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">Opdracht - Event Planner PRO</div>

<div class="toolbar">
<button>Check</button>
<button>Planning</button>
<button>Offerte</button>
<button>Factuur</button>
<button>CreditFactuur</button>
<button>Copy</button>
<button style="margin-left:auto;color:red;">Lock</button>
<button>Annuleren</button>
<button>OK</button>
</div>

<div class="wrap">

<!-- LINKS -->
<div class="box">

<label>Opdracht nr:</label>
<input value="2518">

<label>Van datum:</label>
<input type="date">

<label>Tot datum:</label>
<input type="date">

<label>Status:</label>
<select>
<option>Offerte</option>
<option>Bevestigd</option>
<option>Betaald</option>
</select>

<label>Prijs:</label>
<input placeholder="€ 0,00">

<label>Borg:</label>
<input placeholder="€ 0,00">

<label>Factuur nr:</label>
<input>

<label>Bijzonderheden:</label>
<textarea></textarea>

<button class="save">Opslaan opdracht</button>

</div>

<!-- RECHTS -->
<div class="box">

<div class="tabs">
<button class="active" onclick="tab('klant',this)">Klant</button>
<button onclick="tab('locatie',this)">Lokatie</button>
<button onclick="tab('artikelen',this)">Artikelen</button>
<button onclick="tab('extra',this)">Extra</button>
<button onclick="tab('werk',this)">Werkzaamheden</button>
<button onclick="tab('logboek',this)">Logboek</button>
</div>

<!-- klant -->
<div id="klant" class="section active">

<button class="rightbtn">Selecteer bestaande klant</button>

<div class="grid2"><div>Nr:</div><input></div>
<div class="grid2"><div>Naam:</div><input></div>
<div class="grid2"><div>Straat:</div><input></div>

<div class="small">
<div>
<label>Postcode</label>
<input>
</div>
<div>
<label>Plaats</label>
<input>
</div>
</div>

<div class="grid2"><div>Email:</div><input></div>
<div class="grid2"><div>IBAN:</div><input></div>

<label>Type:</label>
<select>
<option>Particulier</option>
<option>Bedrijf</option>
<option>Contributie</option>
</select>

<label>Bijzonderheden:</label>
<textarea></textarea>

<br><br>

<table>
<tr>
<th>Functie</th>
<th>Naam</th>
<th>Telefoon</th>
<th>Email</th>
</tr>
<tr>
<td>Contact</td>
<td>Jan Jansen</td>
<td>0612345678</td>
<td>mail@test.nl</td>
</tr>
</table>

</div>

<!-- locatie -->
<div id="locatie" class="section">
<h3>Locatie gegevens</h3><br>
<input placeholder="Adres event">
<input placeholder="Postcode">
<input placeholder="Plaats">
<input placeholder="Contact op locatie">
</div>

<!-- artikelen -->
<div id="artikelen" class="section">
<h3>Materialen toevoegen</h3><br>
<table>
<tr><th>Code</th><th>Omschrijving</th><th>Aantal</th></tr>
<tr><td>TW01</td><td>Tapwagen 1</td><td>1</td></tr>
<tr><td>KW01</td><td>Koelwagen 1</td><td>2</td></tr>
</table>
</div>

<!-- extra -->
<div id="extra" class="section">
<h3>Extra kosten</h3><br>
<input placeholder="Transport">
<input placeholder="Opbouw">
<input placeholder="Schoonmaak">
</div>

<!-- werk -->
<div id="werk" class="section">
<h3>Werkzaamheden</h3><br>
<textarea></textarea>
</div>

<!-- logboek -->
<div id="logboek" class="section">
<h3>Logboek</h3><br>
<textarea></textarea>
</div>

</div>

</div>

<script>
function tab(id,el){
document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
el.classList.add('active');
}
</script>

</body>
</html>
