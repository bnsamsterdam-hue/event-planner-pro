<script>
/* ===== V7 LIVE PATCH 1 ===== */
let db = {
orders: JSON.parse(localStorage.getItem("v7_orders") || "[]"),
clients: JSON.parse(localStorage.getItem("v7_clients") || "[]"),
locations: JSON.parse(localStorage.getItem("v7_locations") || "[]"),
materials: JSON.parse(localStorage.getItem("v7_materials") || "[]")
};

function saveDB(){
localStorage.setItem("v7_orders", JSON.stringify(db.orders));
localStorage.setItem("v7_clients", JSON.stringify(db.clients));
localStorage.setItem("v7_locations", JSON.stringify(db.locations));
localStorage.setItem("v7_materials", JSON.stringify(db.materials));
}

/* ===== OPSLAAN OPDRACHT ===== */
document.querySelector(".save").onclick=function(){
let nr=document.querySelector('input[value="2026-1001"]').value;
let titel=document.querySelector('input[placeholder="Naam event"]').value;
let status=document.querySelector("select").value;

db.orders.push({
nr:nr,
titel:titel,
status:status,
datum:new Date().toLocaleDateString()
});
saveDB();
alert("Opdracht opgeslagen");
renderOrders();
};

/* ===== RENDER FACTUREN TAB ALS OPDRACHTEN ===== */
function renderOrders(){
let table=document.querySelector("#facturen table");
table.innerHTML=`
<tr>
<th>Nr</th>
<th>Titel</th>
<th>Status</th>
<th>Datum</th>
</tr>
`;
db.orders.forEach(o=>{
table.innerHTML += `
<tr>
<td>${o.nr}</td>
<td>${o.titel}</td>
<td>${o.status}</td>
<td>${o.datum}</td>
</tr>`;
});
}

/* ===== NIEUWE KLANT ===== */
document.querySelectorAll(".save")[3].onclick=function(){
let naam=prompt("Nieuwe opdrachtgever");
if(!naam)return;
db.clients.push({naam:naam,plaats:"Onbekend",tel:"-"});
saveDB();
renderClients();
};

/* ===== RENDER KLANTEN ===== */
function renderClients(){
let table=document.querySelector("#opdrachtgevers table");
table.innerHTML=`
<tr><th>Naam</th><th>Plaats</th><th>Tel</th></tr>
`;
db.clients.forEach(c=>{
table.innerHTML += `
<tr>
<td>${c.naam}</td>
<td>${c.plaats}</td>
<td>${c.tel}</td>
</tr>`;
});
}

/* ===== NIEUWE LOCATIE ===== */
document.querySelectorAll(".save")[4].onclick=function(){
let naam=prompt("Nieuwe locatie");
if(!naam)return;
db.locations.push({naam:naam,plaats:"Onbekend",contact:"-"});
saveDB();
renderLocations();
};

function renderLocations(){
let table=document.querySelector("#locatieklanten table");
table.innerHTML=`
<tr><th>Naam</th><th>Plaats</th><th>Contact</th></tr>
`;
db.locations.forEach(l=>{
table.innerHTML += `
<tr>
<td>${l.naam}</td>
<td>${l.plaats}</td>
<td>${l.contact}</td>
</tr>`;
});
}

/* ===== NIEUW MATERIAAL ===== */
document.querySelectorAll(".save")[2].onclick=function(){
let code=prompt("Code");
let oms=prompt("Omschrijving");
let prijs=prompt("Prijs");
if(!code)return;

db.materials.push({
code:code,
oms:oms,
prijs:prijs
});
saveDB();
renderMaterials();
};

function renderMaterials(){
let table=document.querySelector("#materialen table");
table.innerHTML=`
<tr><th>Code</th><th>Omschrijving</th><th>Prijs</th></tr>
`;
db.materials.forEach(m=>{
table.innerHTML += `
<tr>
<td>${m.code}</td>
<td>${m.oms}</td>
<td>€${m.prijs}</td>
</tr>`;
});
}

/* ===== ZOEK IN MATERIALEN ===== */
document.querySelector("#materialen input").onkeyup=function(){
let q=this.value.toLowerCase();
let rows=document.querySelectorAll("#materialen table tr");
rows.forEach((r,i)=>{
if(i===0)return;
r.style.display=r.innerText.toLowerCase().includes(q)?"":"none";
});
};

/* ===== START ===== */
renderOrders();
renderClients();
renderLocations();
renderMaterials();
</script>
