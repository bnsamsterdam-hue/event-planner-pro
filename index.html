<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Planner PRO V8 Complete</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="pinScreen" class="pin-screen">
    <div class="pin-terminal">
      <div class="terminal-top">EVENT PLANNER PRO V8</div>
      <div class="terminal-display">
        <div class="display-label" id="loginLabel">Voer toegangscode in</div>
        <div class="pin-dots" id="pinDots">••••</div>
        <select id="loginUser"></select>
        <div class="pin-error" id="pinError"></div>
      </div>
      <div class="keypad">
        <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
        <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
        <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
        <button class="danger" data-key="clear">Wis</button><button data-key="0">0</button><button class="ok" data-key="ok">OK</button>
      </div>
      <small>Startcodes: Admin 1111 • Planner 2222 • Bezorger 3333 • Kantoor 4444</small>
    </div>
  </div>

  <div class="shell">
    <aside class="sidebar">
      <h1>Event Planner <span>PRO V8</span></h1>
      <div class="user-card"><strong id="currentUserName">Niet ingelogd</strong><small id="currentUserRole"></small></div>
      <nav id="nav"></nav>
      <button id="logoutBtn" class="ghost full">Uitloggen</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><h2 id="pageTitle">Dashboard</h2><p id="pageSub">Centraal overzicht</p></div>
        <div class="top-actions">
          <input id="globalSearch" placeholder="Zoek opdracht, klant, materiaal, adres..." />
          <button id="defectButton" class="alert-btn">Defecten (0)</button>
          <button id="syncBtn">Sync status</button>
        </div>
      </header>

      <section id="dashboard" class="page active"></section>
      <section id="newOrder" class="page"></section>
      <section id="planning" class="page"></section>
      <section id="orders" class="page"></section>
      <section id="materials" class="page"></section>
      <section id="drivers" class="page"></section>
      <section id="driverApp" class="page"></section>
      <section id="complaints" class="page"></section>
      <section id="invoices" class="page"></section>
      <section id="admin" class="page"></section>
    </main>
  </div>

  <template id="orderFormTpl">
    <div class="panel">
      <h3>Nieuwe opdracht</h3>
      <form id="orderForm" class="grid form">
        <label>Opdrachtnummer<input name="number" readonly /></label>
        <label>Titel / eventnaam<input name="title" required /></label>
        <label>Klant<input name="customer" list="customersList" required /></label>
        <label>Adres / locatie<input name="location" required /></label>
        <label>Begin datum<input name="from" type="date" required /></label>
        <label>Eind datum<input name="to" type="date" required /></label>
        <label class="check"><input name="showLocation" type="checkbox" checked /> Locatie tonen op bon/factuur</label>
        <label>Status<select name="status"><option>Offerte</option><option>Bevestigd</option><option>Onderweg</option><option>Uitgevoerd</option><option>Gefactureerd</option><option>Betaald</option></select></label>
        <label class="price-field">Prijs EUR<input name="price" type="number" step="0.01" /></label>
        <label>Bezorger<select name="driver"></select></label>
        <label>Voertuig<input name="vehicle" placeholder="Bus / truck" /></label>
        <label class="full">Materialen<select name="materials" multiple size="8"></select><small>Bij meerdere artikelen krijgt planner en bezorger automatisch LET OP melding.</small></label>
        <label class="full">Interne notities<textarea name="notes" rows="4"></textarea></label>
        <div class="actions full">
          <button type="submit">Opslaan opdracht</button>
          <button type="button" id="confirmBtn">Opdrachtbevestiging PDF/print</button>
          <button type="button" id="invoiceFromOrderBtn">Factuur maken</button>
        </div>
      </form>
      <datalist id="customersList"></datalist>
    </div>
  </template>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
